<script>
let TU_LAST_GENERATED = '';
function tuEsc(v){return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function tuAttr(v){return tuEsc(v).replace(/`/g,'&#96;')}
function tuInitial(name){const w=String(name||'').trim().split(/\s+/).filter(Boolean);if(!w.length)return 'FC';if(w.length===1)return w[0].slice(0,2).toUpperCase();return (w[0][0]+w[w.length-1][0]).toUpperCase()}
function tuLogo(team){return 'https://tse2.mm.bing.net/th?q='+encodeURIComponent(team+' football logo')+'&w=120&h=120&c=7'}
function parseMatchLine(line){
  const s=String(line||'').trim();
  const sm=s.match(/(\d+)\s*[:\-]\s*(\d+)\s*$/);
  if(!sm)return null;
  const score=sm[1]+':'+sm[2];
  const before=s.slice(0,sm.index).trim();
  const parts=before.split(/\s+vs\s+/i);
  if(parts.length<2)return null;
  let left=parts[0].trim();
  const away=parts.slice(1).join(' vs ').trim();
  let date='',time='',home=left;
  const dm=left.match(/^(\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)\s+(\d{1,2}:\d{2})\s+(.+)$/);
  if(dm){date=dm[1];time=dm[2];home=dm[3].trim();}
  return {date,time,home,away,score,raw:s};
}
function parseGroups(raw){
  const lines=String(raw||'').split(/\r?\n/).map(v=>v.trim()).filter(Boolean);
  let groups=[]; let current=null; let bad=[];
  for(const line of lines){
    if(/\bvs\b/i.test(line) && /(\d+)\s*[:\-]\s*(\d+)\s*$/.test(line)){
      if(!current){current={title:'PREDIKSI BOLA',matches:[]};groups.push(current)}
      const m=parseMatchLine(line);
      if(m)current.matches.push(m); else bad.push(line);
    }else{
      current={title:line,matches:[]};
      groups.push(current);
    }
  }
  groups=groups.filter(g=>g.matches.length);
  return {groups,bad};
}
function makeTeamLogo(team){
  return '<div class="tu-logo"><span>'+tuEsc(tuInitial(team))+'</span><img src="'+tuAttr(tuLogo(team))+'" alt="'+tuAttr(team)+'" onerror="this.style.display=\'none\'"></div>';
}

    const gid='lg'+i;

        + '<div class="tu-mid"><div class="tu-vs">PREDICTION</div><div class="tu-score">'+tuEsc(m.score)+'</div><div class="tu-time">'+tuEsc(((m.date+' '+m.time).trim()||'JADWAL'))+' WIB</div></div>'
        + '<div class="tu-team tu-right">'+makeTeamLogo(m.away)+'<div class="tu-name">'+tuEsc(m.away)+'</div></div>'
        + '</article>';
    });
    content += '<section class="tu-league" data-league="'+gid+'"><div class="tu-league-title"><span>🏆</span><b>'+tuEsc(g.title)+'</b><span>🏆</span></div>'+rows+'</section>';
  });
  const logo = cfg.logo ? '<img class="tu-main-logo" src="'+tuAttr(cfg.logo)+'" alt="logo" onerror="this.style.display=\'none\'">' : '';

#${uid} .tu-match:hover{transform:translateY(-2px);border-color:#00ead3;box-shadow:0 0 24px rgba(0,234,211,.22)}

#${uid} .tu-team{display:flex;align-items:center;gap:13px;min-width:0}

<script>(function(){var root=document.getElementById(${JSON.stringify(uid)});if(!root)return;var sel=root.querySelector('[data-tu-filter]');if(sel){sel.addEventListener('change',function(){var val=this.value;root.querySelectorAll('.tu-league').forEach(function(x){x.style.display=(val==='all'||x.getAttribute('data-league')===val)?'block':'none';});});}var clock=root.querySelector('[data-tu-clock]');function updClock(){if(!clock)return;var now=new Date();var parts=new Intl.DateTimeFormat('id-ID',{timeZone:'Asia/Jakarta',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(now);var m={};parts.forEach(function(p){m[p.type]=p.value;});clock.textContent='WIB • '+m.day+'/'+m.month+'/'+m.year+' • '+m.hour+':'+m.minute+':'+m.second;}updClock();setInterval(updClock,1000);})();<\/script>`;
}
function bindPreview(box){
  const root=box.querySelector('[id^="TU_PRO_"]');
  if(!root)return;

      root.querySelectorAll('.tu-league').forEach(x=>x.style.display=(val==='all'||x.getAttribute('data-league')===val)?'block':'none');
    });
  }
}
function showMsg(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';setTimeout(()=>{el.style.display='none';},2600)}
function generateTUPro(){
  const raw=document.getElementById('matchInp').value;
  const parsed=parseGroups(raw);
  const err=document.getElementById('tuError');
  err.style.display='none';
  if(!parsed.groups.length){err.textContent='Data belum terbaca. Gunakan format: 21/06 00:00 TEAM A vs TEAM B 1:0';err.style.display='block';return;}
  const cfg={
    title:document.getElementById('tglInp').value||'PREDIKSI BOLA TERJITU',
    run:document.getElementById('runInp').value||'SELAMAT DATANG',
    logo:document.getElementById('logoInp').value.trim(),
    bg:document.getElementById('bgInp').value.trim()
  };
  const html=buildGeneratedHTML(parsed.groups,cfg);
  TU_LAST_GENERATED=html;
  document.getElementById('finalHtml').value=html;
  document.getElementById('outputArea').style.display='block';
  const box=document.getElementById('livePreviewBox');
  box.innerHTML=html;
  bindPreview(box);
  const total=parsed.groups.reduce((a,g)=>a+g.matches.length,0);
  document.getElementById('tuCount').textContent=total+' Match • '+parsed.groups.length+' Liga';
  if(parsed.bad.length){err.textContent='Ada '+parsed.bad.length+' baris tidak terbaca. Cek format baris tersebut.';err.style.display='block';}
}
async function copyCodeTU(){
  if(!TU_LAST_GENERATED)generateTUPro();
  if(!TU_LAST_GENERATED)return;
  try{await navigator.clipboard.writeText(TU_LAST_GENERATED);showMsg('tuOk','Kode HTML berhasil dicopy.');}
  catch(e){const c=document.getElementById('finalHtml');c.style.display='block';c.select();document.execCommand('copy');showMsg('tuOk','Kode HTML berhasil dicopy.');}
}
function downloadCodeTU(){
  if(!TU_LAST_GENERATED)generateTUPro();
  if(!TU_LAST_GENERATED)return;
  const blob=new Blob([TU_LAST_GENERATED],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hasil-generate-worldcup-keren-v2.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),600);
  showMsg('tuOk','File HTML hasil generate berhasil dibuat.');
}
window.addEventListener('load',generateTUPro);
</script>
